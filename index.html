<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career AI 3.1</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="setup" class="screen">

<h1>⚽ CAREER AI 3.1</h1>

<p>Crea tu historia como entrenador</p>


<select id="clubSelect"></select>


<button onclick="startCareer()">
🚀 COMENZAR CARRERA
</button>


<button onclick="continueCareer()">
💾 CONTINUAR CARRERA
</button>


</div>



<div id="career" class="hidden">


<header>

<h1 id="clubName"></h1>

<p>Temporada 2026/27</p>

</header>

<div class="card">

<h2>🏆 Puntos</h2>

<p id="points">0 pts</p>

</div>


<div class="grid">


<div class="card">
<h2>👔 Presidente</h2>
<p id="president"></p>
</div>


<div class="card">
<h2>💰 Presupuesto</h2>
<p id="budget"></p>
</div>


<div class="card">
<h2>📊 Confianza</h2>
<p id="trust"></p>
</div>


<div class="card">
<h2>🎯 Objetivo</h2>
<p id="objective"></p>
</div>


</div>



<div class="news">

<h2>📰 Noticias del club</h2>

<div id="events"></div>


<button onclick="newEvent()">
🎲 Generar evento
</button>


</div>


</div>

<div class="card">

<h2>🌍 Liga</h2>

<p id="league"></p>

</div>


<script src="database.js"></script>
<script src="match_engine.js"></script>
<script src="app.js"></script>


</body>

</html>
