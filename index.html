<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career AI 3.0</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="setup" class="screen">

<h1>⚽ CAREER AI 3.0</h1>

<p>Tu carrera. Tus decisiones. Tu historia.</p>

<select id="gameSelect">
<option value="FC26">FC 26</option>
<option value="FC25">FC 25</option>
</select>


<select id="clubSelect"></select>


<button onclick="startCareer()">
🚀 COMENZAR CARRERA
</button>

</div>



<div id="career" class="hidden">


<header>

<h1 id="clubName">
</h1>

<p id="season">
Temporada 2026/27
</p>

</header>



<section class="cards">


<div class="card">

<h3>👔 Presidente</h3>

<p id="president"></p>

</div>


<div class="card">

<h3>💰 Presupuesto</h3>

<p id="budget"></p>

</div>


<div class="card">

<h3>📊 Confianza</h3>

<p id="trust"></p>

</div>


</section>



<section class="messages">

<h2>📩 Noticias del club</h2>

<div id="events"></div>

</section>



<button onclick="generateEvent()">
🎲 Nuevo evento
</button>


</div>



<script src="database.js"></script>
<script src="presidents.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>

</body>
</html>
